name: Release on merge to main

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  test:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm test

  tag:
    needs: test
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      # Uses the default GITHUB_TOKEN (this job has contents: write); main is not
      # branch-protected, so no custom PAT is required. Tags are plain semver (no "v" prefix).
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Bump version, tag, and push
        run: |
          node --check bin/cli.js
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          NEW_VERSION=$(node -e "const fs=require('fs');const p='package.json';const j=JSON.parse(fs.readFileSync(p));const v=j.version.split('.');v[2]=+v[2]+1;j.version=v.join('.');fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n');console.log(j.version)")
          git add package.json
          git commit -m "chore: release ${NEW_VERSION} [skip ci]"
          git tag "${NEW_VERSION}"
          git push origin main
          git push origin "v${NEW_VERSION}"
